<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานการลา – Check-In System</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏖️</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: #f6f8fa; min-height: 100vh; }

.topbar { background: #0d1117; color: #f0b429; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
.topbar h1 { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
.topbar-right { display: flex; gap: 10px; align-items: center; }
.topbar span { font-size: 12px; color: #8b949e; }
.btn-nav { background: rgba(255,255,255,0.1); border: none; color: #e6edf3; font-size: 13px; padding: 6px 12px; border-radius: 7px; cursor: pointer; font-family: inherit; }

.toolbar { background: #fff; border-bottom: 1px solid #d0d7de; padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn { padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
.btn-primary { background: #0969da; color: #fff; }
.btn-success { background: #1a7f37; color: #fff; }
.toolbar input, .toolbar select { padding: 7px 12px; border: 1px solid #d0d7de; border-radius: 8px; font-size: 13px; font-family: inherit; }

.tbl-wrap { overflow-x: auto; padding: 16px 20px; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
th { background: #24292f; color: #fff; padding: 10px 14px; font-size: 12px; text-align: left; white-space: nowrap; }
td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #eaecef; }
tr:last-child td { border-bottom: none; }
tr:nth-child(even) { background: #fafbfc; }

.empty { text-align: center; padding: 60px 20px; color: #8c959f; }
.empty .ic { font-size: 40px; margin-bottom: 10px; }

.photo-th { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 1px solid #d0d7de; }

.loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.7); z-index: 900; align-items: center; justify-content: center; font-size: 14px; color: #57606a; }
.loading.show { display: flex; }

.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 950; align-items: center; justify-content: center; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>🏖️ รายงานการลา / วันหยุดประจำ</h1>
  <div class="topbar-right">
    <span id="who">—</span>
    <button class="btn-nav" onclick="location.href='admin.html'">⚡ Admin Dashboard</button>
    <button class="btn-nav" onclick="logout()">🚪 ออกจากระบบ</button>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="loadLeave()">🔄 โหลดข้อมูลการลา</button>
  <select id="lv-f-emp"><option value="">👤 ทุกคน</option></select>
  <input type="month" id="lv-f-month">
  <button class="btn" style="background:#f6f8fa;color:#57606a;border:1px solid #d0d7de" onclick="renderLeave()">🔍 กรอง</button>
  <button class="btn btn-success" onclick="exportLeaveCSV()">📊 Export Excel</button>
</div>

<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th>#</th><th>วันที่ลา</th><th>รหัสพนักงาน</th><th>ชื่อ</th><th>ประเภท</th><th>ช่วงเวลา</th>
      <th>ชั่วโมง</th><th>หมายเหตุ</th><th>ใบรับรอง</th><th>บันทึกเมื่อ</th>
    </tr></thead>
    <tbody id="leave-body">
      <tr><td colspan="10"><div class="empty"><div class="ic">🏖️</div>กด "โหลดข้อมูลการลา"</div></td></tr>
    </tbody>
  </table>
</div>

<div class="loading" id="loading">⏳ กำลังโหลด...</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="">
</div>

<script>
// ══════════════════════════════════════════════════════════════
// หน้ารายงานการลา — แยกไฟล์ต่างหาก ไม่แชร์ตัวแปร/สคริปต์กับ
// admin.html หรือ checkin.html เลย เพื่อไม่ให้บั๊กในหน้านี้
// (ถ้ามี) ไปกระทบระบบเช็คอิน/จบงาน/payroll ที่ใช้งานจริงอยู่
// ══════════════════════════════════════════════════════════════
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxst_UC3w1zJJ_1gc3aBthvRnEhYbdX76E0z7hDV8nWEKh2tVlWV2YEpQMiCVzMOhuv/exec';
var API_TOKEN  = 'FLO-ckn-8Kq2Wm7Zx4Rp9Nv3Ts6Yb1Ha'; // 🔐 ต้องตรงกับ GAS

var mem = {};
var store = {
  get: function(k){ try { return localStorage.getItem(k); } catch(e) { return mem[k]||null; } },
  set: function(k,v){ try { localStorage.setItem(k,v); } catch(e) { mem[k]=v; } }
};

var session = (function(){ try { return JSON.parse(store.get('session')||'null'); } catch(e) { return null; } })();
if (!session || (session.role !== 'admin' && session.role !== 'support')) {
  alert('ต้องล็อกอินด้วยบัญชี Admin หรือ Support');
  location.href = 'index.html';
}
document.getElementById('who').textContent = session ? session.name : '—';

function logout() { store.set('session',''); location.href = 'index.html'; }
function showLoad(v) { document.getElementById('loading').classList.toggle('show', v); }

async function fetchJSON(url, tries) {
  tries = tries || 3;
  url += (url.indexOf('?') > -1 ? '&' : '?') + 'token=' + encodeURIComponent(API_TOKEN);
  var lastErr;
  for (var i = 0; i < tries; i++) {
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, 12000);
    try {
      var res  = await fetch(url, { signal: ctrl.signal });
      var text = await res.text();
      clearTimeout(timer);
      if (text.trim().indexOf('<') === 0) throw new Error('GAS ยังตื่นไม่เต็มที่');
      return JSON.parse(text);
    } catch(e) {
      clearTimeout(timer);
      lastErr = e;
      if (i < tries - 1) await new Promise(function(r){ setTimeout(r, 1500); });
    }
  }
  throw lastErr;
}

function dmyToISO(s) {
  var m = (s||'').match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (!m) return '';
  return m[3] + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
}
function fixPhotoUrl(u) {
  if (!u) return '';
  return u.replace('drive.google.com/thumbnail?id=', 'drive.google.com/thumbnail?sz=w400&id=');
}
function openLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

var leaveData = [];
var userData  = [];

async function loadLeave() {
  showLoad(true);
  try {
    var json = await fetchJSON(SCRIPT_URL + '?action=getLeave&t=' + Date.now());
    leaveData = json.data || [];
    try {
      var uj = await fetchJSON(SCRIPT_URL + '?action=getUsers&t=' + Date.now());
      userData = uj.data || [];
    } catch(e) { userData = []; }

    var names = [];
    var seen = {};
    leaveData.forEach(function(r){ if (r.name && !seen[r.name]) { seen[r.name] = 1; names.push(r.name); } });
    names.sort();
    var sel = document.getElementById('lv-f-emp');
    var prev = sel.value;
    sel.innerHTML = '<option value="">👤 ทุกคน</option>' + names.map(function(n){ return '<option value="'+n+'">'+n+'</option>'; }).join('');
    if (prev) sel.value = prev;
    renderLeave();
  } catch(e) { alert('โหลดไม่สำเร็จ: ' + e.message); }
  showLoad(false);
}

function getFilteredLeave() {
  var emp   = document.getElementById('lv-f-emp').value;
  var month = document.getElementById('lv-f-month').value;
  return leaveData.filter(function(r){
    if (emp && r.name !== emp) return false;
    if (month && dmyToISO(r.leaveDate).indexOf(month) !== 0) return false;
    return true;
  });
}

function renderLeave() {
  var tbody = document.getElementById('leave-body');
  var list = getFilteredLeave();
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="10"><div class="empty"><div class="ic">🏖️</div>ไม่พบข้อมูลการลา</div></td></tr>'; return; }
  var col = { 'วันหยุดประจำ':'#1a7f37', 'ลาป่วย':'#cf222e', 'ลากิจ':'#0969da', 'พักร้อน':'#8250df', 'ลาอื่นๆ':'#57606a' };
  var codeOf = {};
  userData.forEach(function(u){ if (u.empCode) codeOf[u.name] = (u.empCode+'').trim(); });

  tbody.innerHTML = list.map(function(r, i){
    var cert = fixPhotoUrl(r.cert);
    var certCell = (cert && cert.indexOf('error') < 0)
      ? '<img class="photo-th" src="'+cert+'" onclick="openLightbox(\''+cert+'\')">'
      : '<span style="color:#8c959f">-</span>';
    var time = r.mode === 'ช่วงเวลา' ? (r.startTime + '-' + r.endTime) : 'ทั้งวัน';
    var hrs  = r.mode === 'ช่วงเวลา' ? (r.hours ? r.hours + ' ชม.' : '-') : 'ทั้งวัน';
    return '<tr>' +
      '<td style="color:#8c959f;font-size:11px">' + (i+1) + '</td>' +
      '<td><b>' + (r.leaveDate||'-') + '</b></td>' +
      '<td>' + (codeOf[r.name] || '-') + '</td>' +
      '<td>' + (r.name||'-') + '</td>' +
      '<td><span style="color:' + (col[r.leaveType]||'#57606a') + ';font-weight:700">' + (r.leaveType||'-') + '</span></td>' +
      '<td>' + time + '</td>' +
      '<td>' + hrs + '</td>' +
      '<td style="font-size:12px;color:#57606a">' + (r.note||'-') + '</td>' +
      '<td>' + certCell + '</td>' +
      '<td style="font-size:11px;color:#8c959f">' + (r.timestamp||'-') + '</td>' +
    '</tr>';
  }).join('');
}

function exportLeaveCSV() {
  var rows = getFilteredLeave();
  if (!rows.length) { alert('ไม่มีข้อมูล'); return; }
  var codeOf = {};
  userData.forEach(function(u){ if (u.empCode) codeOf[u.name] = (u.empCode+'').trim(); });
  var h = ['วันที่ลา','รหัสพนักงาน','ชื่อ','ประเภท','ช่วงเวลา','ชั่วโมง','หมายเหตุ','ใบรับรอง','บันทึกเมื่อ'];
  var data = rows.map(function(r){
    var time = r.mode === 'ช่วงเวลา' ? (r.startTime + '-' + r.endTime) : 'ทั้งวัน';
    var hrs  = r.mode === 'ช่วงเวลา' ? (r.hours ? r.hours + ' ชม.' : '') : 'ทั้งวัน';
    var cert = (r.cert && r.cert.indexOf('error') < 0) ? r.cert : '';
    return [r.leaveDate, codeOf[r.name]||'', r.name, r.leaveType, time, hrs, r.note, cert, r.timestamp];
  });
  var csv = [h].concat(data).map(function(row){
    return row.map(function(v){ return '"' + (v||'').toString().replace(/"/g,'""') + '"'; }).join(',');
  }).join('\n');
  var month = document.getElementById('lv-f-month').value;
  var emp   = document.getElementById('lv-f-emp').value;
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = 'leave_' + (emp||'all') + '_' + (month||'all') + '.csv';
  a.click();
}
</script>
</body>
</html>
